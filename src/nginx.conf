server_tokens off;

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    try_files $uri $uri/ /index.html;

    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;

    client_body_buffer_size 1k;
    client_max_body_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # Security headers
    add_header Content-Security-Policy "default-src 'none'; style-src 'self'; script-src 'self' 'sha256-DJbGsch3BQwzYkoD/3IaG6AUke1hpVhL6iR8HOceilg='; img-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cache-Control "public, max-age=86400" always;

    # Static assets: 1 week cache
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|xml|txt)$ {
        expires 7d;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}
