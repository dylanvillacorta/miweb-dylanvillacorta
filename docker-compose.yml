services:
  web:
    build: .
    container_name: miweb-dylanvillacorta
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PORT}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
